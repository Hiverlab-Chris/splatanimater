<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaussian Splat Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    canvas { touch-action: none; display: block; }

    /* ── UI Panel ── */
    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 280px;
    }

    .panel {
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px 16px;
      backdrop-filter: blur(8px);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
    }

    /* Load section */
    #drop-zone {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone.drag-over {
      border-color: #5b8fff;
      background: rgba(91,143,255,0.08);
      color: #fff;
    }
    #drop-zone input { display: none; }

    .url-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .url-row input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
    }
    .url-row input::placeholder { color: rgba(255,255,255,0.3); }
    .url-row input:focus { border-color: #5b8fff; }

    /* Buttons */
    button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: rgba(255,255,255,0.18); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary {
      background: #3b6cff;
      border-color: #5b8fff;
    }
    button.primary:hover { background: #4a7aff; }

    /* Animation section */
    .effect-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .effect-btn {
      font-size: 12px;
      padding: 7px 6px;
      border-radius: 6px;
      text-align: center;
    }
    .effect-btn.active {
      background: #3b6cff;
      border-color: #5b8fff;
    }

    /* Sliders */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .slider-row label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      width: 80px;
      flex-shrink: 0;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #5b8fff;
      height: 4px;
    }
    .slider-row span {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      width: 30px;
      text-align: right;
    }

    /* Playback bar */
    .playback-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 8px;
    }
    #progress-bar {
      flex: 1;
      accent-color: #5b8fff;
      height: 4px;
    }
    #time-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      width: 32px;
      text-align: right;
    }

    /* Status */
    #status {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      padding: 6px 0 0;
      min-height: 18px;
    }
    #status.error { color: #ff6b6b; }
    #status.ok { color: #6bff9e; }

    /* Loading spinner */
    #loader {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      font-size: 16px;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
    }
    #loader.visible { display: flex; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #5b8fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <!-- Loading overlay -->
  <div id="loader">
    <div class="spinner"></div>
    <span id="loader-text">Loading splat…</span>
  </div>

  <!-- UI -->
  <div id="ui">

    <!-- Load panel -->
    <div class="panel">
      <div class="panel-title">Load Gaussian</div>
      <div id="drop-zone">
        Drop .ply / .splat / .spz / .ksplat here<br>or click to browse
        <input type="file" id="file-input" accept=".ply,.splat,.ksplat,.spz,.sogs">
      </div>
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://… (URL to splat file)">
        <button id="load-url-btn">Load</button>
      </div>
      <div id="status"></div>
    </div>

    <!-- Animation panel -->
    <div class="panel">
      <div class="panel-title">Reveal Animation</div>
      <div class="effect-grid">
        <button class="effect-btn active" data-effect="Magic">✨ Magic</button>
        <button class="effect-btn" data-effect="Spread">🌸 Spread</button>
        <button class="effect-btn" data-effect="Unroll">🌀 Unroll</button>
        <button class="effect-btn" data-effect="Twister">🌪 Twister</button>
        <button class="effect-btn" data-effect="Rain">🌧 Rain</button>
        <button class="effect-btn" data-effect="None">⬜ None</button>
      </div>

      <!-- Playback controls -->
      <div class="playback-row" style="margin-top:10px;">
        <button id="play-btn">▶ Play</button>
        <button id="reset-btn">↺ Reset</button>
        <input type="range" id="progress-bar" min="0" max="20" step="0.05" value="0">
        <span id="time-label">0.0s</span>
      </div>

      <!-- Speed -->
      <div class="slider-row">
        <label>Speed</label>
        <input type="range" id="speed-slider" min="0.1" max="3" step="0.05" value="1">
        <span id="speed-val">1.0×</span>
      </div>

      <!-- Orbit toggle -->
      <div class="slider-row" style="margin-top:4px;">
        <label>Orbit cam</label>
        <input type="checkbox" id="orbit-toggle" checked style="width:auto;accent-color:#5b8fff;">
      </div>
    </div>

  </div>

  <!-- SparkJS import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.178.0/three.module.js",
        "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { SparkRenderer, SplatMesh, SparkControls, dyno } from "@sparkjsdev/spark";

    // ── Renderer / Scene / Camera ──────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 500);
    camera.position.set(0, 2, 4);
    camera.lookAt(0, 0, 0);

    const spark = new SparkRenderer({ renderer });
    scene.add(spark);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Controls ───────────────────────────────────────────────────────────
    const controls = new SparkControls({ canvas: renderer.domElement });

    // ── State ──────────────────────────────────────────────────────────────
    let splatMesh = null;
    let animT       = 0;          // current animation time (seconds)
    let isPlaying   = false;
    let animSpeed   = 1.0;
    let currentEffect = "Magic";
    let orbitEnabled  = true;
    let cameraAngle   = 0;

    const animateT = dyno.dynoFloat(0);   // shared dyno float fed into shader

    // ── DOM refs ───────────────────────────────────────────────────────────
    const loader     = document.getElementById("loader");
    const loaderText = document.getElementById("loader-text");
    const status     = document.getElementById("status");
    const playBtn    = document.getElementById("play-btn");
    const resetBtn   = document.getElementById("reset-btn");
    const progressBar = document.getElementById("progress-bar");
    const timeLabel   = document.getElementById("time-label");
    const speedSlider = document.getElementById("speed-slider");
    const speedVal    = document.getElementById("speed-val");
    const orbitToggle = document.getElementById("orbit-toggle");
    const urlInput    = document.getElementById("url-input");

    // ── Helper: show/hide loader ───────────────────────────────────────────
    function setLoading(on, text = "Loading splat…") {
      loaderText.textContent = text;
      loader.classList.toggle("visible", on);
    }
    function setStatus(msg, type = "") {
      status.textContent = msg;
      status.className = type;
    }

    // ── Effect modifier builder ────────────────────────────────────────────
    function buildModifier(effectName) {
      if (effectName === "None") return null;

      const effectType = { Magic: 1, Spread: 2, Unroll: 3, Twister: 4, Rain: 5 }[effectName] ?? 1;

      return dyno.dynoBlock(
        { gsplat: dyno.Gsplat },
        { gsplat: dyno.Gsplat },
        ({ gsplat }) => {
          const d = new dyno.Dyno({
            inTypes: { gsplat: dyno.Gsplat, t: "float", effectType: "int" },
            outTypes: { gsplat: dyno.Gsplat },
            globals: () => [dyno.unindent(`
              vec3 _hash(vec3 p){
                p=fract(p*0.3183099+0.1); p*=17.0;
                return fract(vec3(p.x*p.y*p.z, p.x+p.y*p.z, p.x*p.y+p.z));
              }
              vec3 _noise(vec3 p){
                vec3 i=floor(p); vec3 f=fract(p); f=f*f*(3.0-2.0*f);
                vec3 n000=_hash(i+vec3(0,0,0)); vec3 n100=_hash(i+vec3(1,0,0));
                vec3 n010=_hash(i+vec3(0,1,0)); vec3 n110=_hash(i+vec3(1,1,0));
                vec3 n001=_hash(i+vec3(0,0,1)); vec3 n101=_hash(i+vec3(1,0,1));
                vec3 n011=_hash(i+vec3(0,1,1)); vec3 n111=_hash(i+vec3(1,1,1));
                vec3 x0=mix(n000,n100,f.x); vec3 x1=mix(n010,n110,f.x);
                vec3 x2=mix(n001,n101,f.x); vec3 x3=mix(n011,n111,f.x);
                vec3 y0=mix(x0,x1,f.y);     vec3 y1=mix(x2,x3,f.y);
                return mix(y0,y1,f.z);
              }
              mat2 _rot(float a){ float s=sin(a),c=cos(a); return mat2(c,-s,s,c); }
              vec4 _twister(vec3 pos,vec3 scale,float t){
                vec3 h=_hash(pos);
                float s=smoothstep(0.,8.,t*t*.1-length(pos.xz)*2.+2.);
                if(length(scale)<.05) pos.y=mix(-10.,pos.y,pow(s,2.*h.x));
                pos.xz=mix(pos.xz*.5,pos.xz,pow(s,2.*h.x));
                pos.xz*=_rot(t*(1.0-s)*.2+pos.y*20.*(1.-s)*exp(-1.*length(pos.xz)));
                return vec4(pos,s*s*s*s);
              }
              vec4 _rain(vec3 pos,vec3 scale,float t){
                vec3 h=_hash(pos);
                float s=pow(smoothstep(0.,5.,t*t*.1-length(pos.xz)*2.+1.),.5+h.x);
                float y=pos.y;
                pos.y=min(-10.+s*15.,pos.y);
                pos.xz=mix(pos.xz*.3,pos.xz,s);
                pos.xz*=_rot(t*.3);
                return vec4(pos,smoothstep(-10.,y,pos.y));
              }
            `)],
            statements: ({ inputs, outputs }) => dyno.unindentLines(`
              ${outputs.gsplat} = ${inputs.gsplat};
              float t = ${inputs.t};
              float s = smoothstep(0.,10.,t-4.5)*10.;
              vec3 scales  = ${inputs.gsplat}.scales;
              vec3 localPos = ${inputs.gsplat}.center;
              float l = length(localPos.xz);

              if(${inputs.effectType}==1){
                float border=abs(s-l-.5);
                localPos*=1.-.2*exp(-20.*border);
                vec3 finalScales=mix(scales,vec3(0.002),smoothstep(s-.5,s,l+.5));
                ${outputs.gsplat}.center=localPos+.1*_noise(localPos.xyz*2.+t*.5)*smoothstep(s-.5,s,l+.5);
                ${outputs.gsplat}.scales=finalScales;
                float at=atan(localPos.x,localPos.z)/3.1416;
                ${outputs.gsplat}.rgba*=step(at,t-3.1416);
                ${outputs.gsplat}.rgba+=exp(-20.*border)+exp(-50.*abs(t-at-3.1416))*.5;
              } else if(${inputs.effectType}==2){
                float tt=t*t*.4+.5;
                localPos.xz*=min(1.,.3+max(0.,tt*.05));
                ${outputs.gsplat}.center=localPos;
                ${outputs.gsplat}.scales=max(mix(vec3(0.),scales,min(tt-7.-l*2.5,1.)),mix(vec3(0.),scales*.2,min(tt-1.-l*2.,1.)));
                ${outputs.gsplat}.rgba=mix(vec4(.3),${inputs.gsplat}.rgba,clamp(tt-l*2.5-3.,0.,1.));
              } else if(${inputs.effectType}==3){
                localPos.xz*=_rot((localPos.y*50.-20.)*exp(-t));
                ${outputs.gsplat}.center=localPos*(1.-exp(-t)*2.);
                ${outputs.gsplat}.scales=mix(vec3(0.002),scales,smoothstep(.3,.7,t+localPos.y-2.));
                ${outputs.gsplat}.rgba=${inputs.gsplat}.rgba*step(0.,t*.5+localPos.y-.5);
              } else if(${inputs.effectType}==4){
                vec4 r=_twister(localPos,scales,t);
                ${outputs.gsplat}.center=r.xyz;
                ${outputs.gsplat}.scales=mix(vec3(.002),scales,pow(r.w,12.));
                float spin=-t*.3*(1.-r.w);
                vec4 sq=vec4(0.,sin(spin*.5),0.,cos(spin*.5));
                ${outputs.gsplat}.quaternion=quatQuat(sq,${inputs.gsplat}.quaternion);
              } else if(${inputs.effectType}==5){
                vec4 r=_rain(localPos,scales,t);
                ${outputs.gsplat}.center=r.xyz;
                ${outputs.gsplat}.scales=mix(vec3(.005),scales,pow(r.w,30.));
                float spin=-t*.3;
                vec4 sq=vec4(0.,sin(spin*.5),0.,cos(spin*.5));
                ${outputs.gsplat}.quaternion=quatQuat(sq,${inputs.gsplat}.quaternion);
              }
            `),
          });

          gsplat = d.apply({
            gsplat,
            t: animateT,
            effectType: dyno.dynoInt(effectType),
          }).gsplat;
          return { gsplat };
        }
      );
    }

    // ── Apply effect to current mesh ───────────────────────────────────────
    function applyEffect(effectName) {
      if (!splatMesh) return;
      const mod = buildModifier(effectName);
      splatMesh.objectModifier = mod;
      splatMesh.updateGenerator();
    }

    // ── Load splat ─────────────────────────────────────────────────────────
    async function loadSplat({ url, fileBytes, fileType }) {
      setLoading(true);
      setStatus("");

      // Remove old mesh
      if (splatMesh) {
        scene.remove(splatMesh);
        splatMesh.dispose?.();
        splatMesh = null;
      }

      try {
        const opts = { onLoad: () => setStatus("Loaded ✓", "ok") };
        if (url)       opts.url       = url;
        if (fileBytes) opts.fileBytes = fileBytes;
        if (fileType)  opts.fileType  = fileType;

        splatMesh = new SplatMesh(opts);
        splatMesh.quaternion.set(1, 0, 0, 0);
        scene.add(splatMesh);

        await splatMesh.loaded;

        // Reset anim
        animT = 0;
        animateT.value = 0;
        progressBar.value = 0;
        timeLabel.textContent = "0.0s";
        isPlaying = false;
        playBtn.textContent = "▶ Play";

        applyEffect(currentEffect);
        setLoading(false);
      } catch (err) {
        setLoading(false);
        setStatus("Error: " + err.message, "error");
        console.error(err);
      }
    }

    // ── File drop / browse ─────────────────────────────────────────────────
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");

    dropZone.addEventListener("click", () => fileInput.click());
    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", async e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (!file) return;
      await handleFile(file);
    });
    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (file) await handleFile(file);
    });

    async function handleFile(file) {
      const ext = file.name.split(".").pop().toLowerCase();
      const validExts = ["ply","splat","ksplat","spz","sogs"];
      if (!validExts.includes(ext)) {
        setStatus("Unsupported file type: ." + ext, "error");
        return;
      }
      setStatus("Reading file…");
      const bytes = new Uint8Array(await file.arrayBuffer());
      const needsHint = ext === "splat" || ext === "ksplat";
      await loadSplat({ fileBytes: bytes, fileType: needsHint ? ext : undefined });
    }

    // ── URL load ───────────────────────────────────────────────────────────
    document.getElementById("load-url-btn").addEventListener("click", async () => {
      const url = urlInput.value.trim();
      if (!url) { setStatus("Enter a URL first", "error"); return; }
      await loadSplat({ url });
    });
    urlInput.addEventListener("keydown", async e => {
      if (e.key === "Enter") document.getElementById("load-url-btn").click();
    });

    // ── Effect buttons ─────────────────────────────────────────────────────
    document.querySelectorAll(".effect-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".effect-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentEffect = btn.dataset.effect;
        // Re-apply modifier (and reset time for new reveal)
        animT = 0;
        animateT.value = 0;
        progressBar.value = 0;
        timeLabel.textContent = "0.0s";
        isPlaying = false;
        playBtn.textContent = "▶ Play";
        applyEffect(currentEffect);
      });
    });

    // ── Playback controls ──────────────────────────────────────────────────
    const MAX_T = 20;

    playBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? "⏸ Pause" : "▶ Play";
      if (isPlaying && animT >= MAX_T) {
        animT = 0; // restart
      }
    });

    resetBtn.addEventListener("click", () => {
      animT = 0;
      animateT.value = 0;
      progressBar.value = 0;
      timeLabel.textContent = "0.0s";
      isPlaying = false;
      playBtn.textContent = "▶ Play";
      if (splatMesh) splatMesh.updateVersion?.();
    });

    progressBar.addEventListener("input", () => {
      animT = parseFloat(progressBar.value);
      animateT.value = animT;
      timeLabel.textContent = animT.toFixed(1) + "s";
      if (splatMesh) splatMesh.updateVersion?.();
    });

    speedSlider.addEventListener("input", () => {
      animSpeed = parseFloat(speedSlider.value);
      speedVal.textContent = animSpeed.toFixed(1) + "×";
    });

    orbitToggle.addEventListener("change", () => {
      orbitEnabled = orbitToggle.checked;
    });

    // ── Render loop ────────────────────────────────────────────────────────
    let lastTime = null;
    renderer.setAnimationLoop(function animate(time) {
      const dt = lastTime == null ? 0 : (time - lastTime) / 1000;
      lastTime = time;

      // Advance animation
      if (isPlaying && splatMesh) {
        animT = Math.min(animT + dt * animSpeed, MAX_T);
        animateT.value = animT;
        progressBar.value = animT;
        timeLabel.textContent = animT.toFixed(1) + "s";
        if (animT >= MAX_T) {
          isPlaying = false;
          playBtn.textContent = "▶ Play";
        }
      }

      // Orbit camera — preserve the current zoom radius so scroll-to-zoom still works
      if (orbitEnabled && !(currentEffect === "Twister" || currentEffect === "Rain")) {
        cameraAngle += dt * 0.2;
        const radius = Math.sqrt(camera.position.x ** 2 + camera.position.z ** 2);
        camera.position.x = Math.cos(cameraAngle) * radius;
        camera.position.z = Math.sin(cameraAngle) * radius;
        camera.lookAt(0, 0, 0);
      }

      if (splatMesh) splatMesh.updateVersion?.();

      controls.update(camera);
      renderer.render(scene, camera);
    });

    // ── Toggle UI with H key ───────────────────────────────────────────────
    const ui = document.getElementById("ui");
    const hint = document.createElement("div");
    hint.textContent = "H — toggle UI";
    Object.assign(hint.style, {
      position: "fixed", bottom: "14px", right: "16px",
      fontSize: "11px", color: "rgba(255,255,255,0.25)",
      pointerEvents: "none", userSelect: "none", zIndex: "10",
    });
    document.body.appendChild(hint);

    document.addEventListener("keydown", e => {
      if (e.key === "h" || e.key === "H") {
        const hidden = ui.style.display === "none";
        ui.style.display = hidden ? "" : "none";
        hint.style.display = hidden ? "" : "none";
      }
    });
  </script>
</body>
</html>
